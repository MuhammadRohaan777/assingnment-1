<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill the form</title>
</head>
<body>

<br />

<fieldset>
    <legend><b>Account</b></legend>

    <form action="./next.html">

        <br />

        <label>Email Address:</label><br />
        <input type="email" name="email" placeholder="Enter Email" size="50" required>

        <br />

        <label>Password:</label><br />
        <input type="password" name="password" placeholder="Enter Password" size="50" required>

        <br />

        <label>Confirm Password:</label><br />
        <input type="password" name="confirmPassword" placeholder="Confirm Password" size="50" required>

        <br />
        <br />
        <br />

       
        <a href="./Index.html">
            <img src="./back.png" alt="back" height="40px" width="80px">
        </a>


        <button type="submit" style="border:none; background:none;">
            <img src="./next.png" alt="next" height="40px" width="80px">
        </button>

    </form>

</fieldset>

</body>
</html>
