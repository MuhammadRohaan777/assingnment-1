<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
</head>
<body>

    <form action="./Done.html">

<fieldset>
    <legend><b>Review</b></legend>

    <b>How did you hear about us?</b>
    <select required>
        <option value="" selected disabled>Select Your Option</option>
        <option value="Facebook">Facebook</option>
        <option value="Instagram">Instagram</option>
        <option value="Whatsapp">Whatsapp</option>
        <option value="Others">Others</option>
    </select>

    <br /><br /><br />

    <b>Would you visit again?</b>
    <br />

    <label>Yes</label>
    <input type="radio" name="visit" required>

    <label>No</label>
    <input type="radio" name="visit">

    <label>Maybe</label>
    <input type="radio" name="visit">

    <br /><br /><br />

    <b>Comments</b>
    <br />
    <input type="text" placeholder="Enter your Comments here"
           style="height: 100px; width: 500px;" required>

    <br /><br /><br />

    <b>Documents:</b>
    <br />
    <input type="file" required>

    <br /><br />
    <input type="checkbox" required>
    <label>Sign me up for email updates</label>

    <br /><br />
    
    <a href="./Index.html">
        <img src="./back.png" alt="back" height="40px" width="80px">
    </a>


    <button type="submit" style="border:none; background:none;">
        <img src="./submit.png" alt="submit" height="40px" width="80px">
    </button>

</fieldset>

</form>
    
</body>
</html>
