<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill your information</title>
</head>
<body>

    <form action="./Review.html">

<fieldset>
    <legend><b>Account</b></legend>

    <br />

    <label>First Name:</label><br />
    <input type="text" name="firstname" placeholder="Enter First Name" size="50" required>

    <br />

    <label>Last Name:</label><br />
    <input type="text" name="lastname" placeholder="Enter Last Name" size="50" required>

    <br />

    <label>CNIC:</label><br />
    <div class="cnic">
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>

        <span>-</span>

        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>
        <input type="text" maxlength="1" required>

        <span>-</span>

        <input type="text" maxlength="1" required>
    </div>

    <br />

    <label>Social Link:</label><br />
    <input type="url" name="sociallink" placeholder="www.Facebook.com" size="50">

    <br />
    <br />
    <br />

    <style>
        .cnic {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cnic input {
            width: 20px;
            height: 20px;
            border: 1px solid #999;
            text-align: center;
            font-size: 20px;
            box-sizing: border-box;
        }
    </style>


    <a href="./Index.html">
        <img src="./back.png" alt="back" height="40px" width="80px">
    </a>

   <button type="submit" style="border:none; background:none;">
        <img src="./next.png" alt="next" height="40px" width="80px">
    </button>

</fieldset>

</form>
    
</body>
</html>
